<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテダッシュボード</title>
<?!= include('shared_styles'); ?>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { max-width: none; }
.dashboard-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.dashboard-header h1 { font-size: 16px; font-weight: 700; }
.refresh-btn {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text2);
}
.main { max-width: 900px; margin: 0 auto; padding: 16px 14px; }
.tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.tab-btn {
  padding: 10px 20px;
  border: none;
  background: transparent;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text2);
  font-weight: 500;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}
.tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 700; }
.report-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.report-card.reviewed { opacity: 0.7; }
.report-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.report-patient-name { font-size: 18px; font-weight: 700; }
.report-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin: 12px 0 8px;
}
.poem-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}
.poem-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  text-align: center;
}
.poem-item .p-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.poem-item .p-val { font-size: 15px; font-weight: 700; }
.poem-total {
  display: inline-block;
  font-size: 14px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 8px;
}
.remain-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.remain-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
}
.remain-item .r-name { font-weight: 600; }
.remain-item .r-level { font-size: 12px; color: var(--text2); }
.rx-summary {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  white-space: pre-wrap;
  line-height: 1.6;
}
.comment-area { margin-top: 14px; }
.comment-area label { color: var(--teal); font-size: 13px; font-weight: 700; }
.comment-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  min-height: 80px;
  resize: vertical;
  margin-top: 6px;
  margin-bottom: 8px;
}
.comment-input:focus { outline: none; border-color: var(--green); }
.next-appt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.next-appt-row label { margin: 0; font-size: 13px; font-weight: 600; white-space: nowrap; }
.next-appt-row input {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  flex: 1;
}
.save-btn {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  background: var(--green);
  color: white;
  border: none;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
}
.save-btn:active { background: var(--teal); }
.saved-comment {
  background: var(--green-bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.saved-comment .c-meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .e-icon { font-size: 40px; margin-bottom: 12px; }
.symptom-score-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}
.infection-alert {
  background: var(--red-bg);
  border: 1px solid var(--red-text);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.infection-alert-icon { font-size: 18px; flex-shrink: 0; }
.infection-alert-body { flex: 1; }
.infection-alert-title { font-size: 13px; font-weight: 700; color: var(--red-text); margin-bottom: 4px; }
.infection-sign-tag {
  display: inline-block;
  background: var(--red-text);
  color: white;
  font-size: 11px;
  font-weight: 600;
  border-radius: 20px;
  padding: 2px 9px;
  margin: 2px 3px 2px 0;
}
/* ===== EASI/IGA ===== */
.easi-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-bottom: 8px;
}
.easi-table th, .easi-table td {
  padding: 5px 4px;
  text-align: left;
  vertical-align: middle;
  border-bottom: 1px solid var(--border);
}
.easi-table th {
  color: var(--text2);
  font-weight: 700;
  font-size: 11px;
  white-space: nowrap;
  background: var(--surface2);
}
.easi-table .easi-part-label {
  font-weight: 700;
  font-size: 12px;
  white-space: nowrap;
  min-width: 52px;
}
.easi-btn-group { display: flex; gap: 3px; flex-wrap: nowrap; }
.easi-btn {
  min-width: 28px;
  padding: 5px 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  color: var(--text2);
  line-height: 1;
}
.easi-btn.selected {
  background: var(--teal);
  color: white;
  border-color: var(--teal);
}
.easi-btn:active { opacity: 0.8; }
.easi-part-score {
  font-size: 13px;
  font-weight: 700;
  color: var(--teal);
  text-align: right;
  white-space: nowrap;
  min-width: 44px;
}
.easi-total-row {
  margin: 10px 0 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.easi-severity {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}
.iga-btn-group { display: flex; gap: 4px; margin-top: 6px; }
.iga-btn {
  min-width: 36px;
  padding: 6px 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  color: var(--text2);
}
.iga-btn.selected { background: var(--teal); color: white; border-color: var(--teal); }
.easi-readonly {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.easi-readonly .easi-val { font-weight: 700; }
.assessed-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  background: #e8f5e9;
  color: #2e7d32;
}
/* ===== スコア推移グラフ ===== */
.chart-container {
  position: relative;
  height: 200px;
  margin-bottom: 14px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.chart-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  padding: 12px;
}
/* ===== Claude相談 ===== */
.claude-section {
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.claude-prompt-area {
  width: 100%;
  min-height: 240px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: monospace;
  line-height: 1.6;
  resize: vertical;
  background: var(--surface2);
  color: var(--text);
  box-sizing: border-box;
}
.claude-warn {
  background: var(--amber-bg);
  color: var(--amber-text);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="dashboard-header">
  <div>
    <h1>🌿 カルテダッシュボード</h1>
    <div style="font-size:11px;color:var(--text2);margin-top:2px;">はまこどもクリニック</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">🔄 更新</button>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">未確認 <span id="pending-count" style="display:none;background:var(--red);color:white;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-reviewed" onclick="switchTab('reviewed')">確認済み</button>
  </div>

  <!-- 読み込み中 -->
  <div id="loading-state" style="text-align:center;padding:60px 20px;">
    <div class="spinner" style="margin:0 auto 12px;"></div>
    <div style="color:var(--text2);font-size:14px;">読み込み中...</div>
  </div>

  <!-- 未確認 -->
  <div id="tab-content-pending" style="display:none;"></div>
  <!-- 確認済み -->
  <div id="tab-content-reviewed" style="display:none;"></div>
</div>

<script>
const INFECTION_LABELS = {
  impetigo: 'とびひのような症状（かさぶた・膿）',
  crust:    '黄色いかさぶた',
  exudate:  '浸出液（じゅくじゅく）',
  pain:     '痛み・熱感'
};
const TRIGGER_LABELS = {
  sweat:   '汗',
  dry:     '乾燥・空気の乾き',
  pollen:  '花粉・ほこり',
  pool:    'プール',
  clothes: '衣類・繊維',
  food:    '食べ物',
  stress:  'ストレス・疲れ',
  other:   'その他',
};
const POEM_LABELS = {
  itch: 'かゆみ', sleep: '睡眠障害', bleed: '皮膚出血',
  weep: '滲出', crack: 'ひび割れ', flake: '皮膚むけ', dry: '乾燥'
};
const REMAIN_LABELS = ['なし', 'ほとんどない', '少し残ってる', 'たくさん'];
const SYMPTOM_LABELS = ['なし', '軽度', '中等度', '高度', '最重度'];
const SYMPTOM_COLORS = ['var(--green)', '#81c784', 'var(--amber)', '#e57373', 'var(--red)'];

// EASI定数
const EASI_WEIGHT = { head: 0.1, trunk: 0.3, upperLimb: 0.2, lowerLimb: 0.4 };
const EASI_PARTS  = ['head', 'trunk', 'upperLimb', 'lowerLimb'];
const EASI_SIGNS  = ['E', 'I', 'Ex', 'L'];
const EASI_PART_LABELS = { head: '頭頸部', trunk: '体幹', upperLimb: '上肢', lowerLimb: '下肢' };
const EASI_SIGN_LABELS = { E: '紅斑', I: '浮腫/丘疹', Ex: '掻破痕', L: '苔癬化' };
const EASI_SEVERITY_MAP = [
  { max: 0,  label: 'Clear',       bg: '#f5f5f5',   color: '#9e9e9e' },
  { max: 6,  label: 'Mild',        bg: '#e8f5e9',   color: '#2e7d32' },
  { max: 21, label: 'Moderate',    bg: '#fff8e1',   color: '#f57f17' },
  { max: 50, label: 'Severe',      bg: '#fff3e0',   color: '#e65100' },
  { max: Infinity, label: 'Very Severe', bg: '#ffebee', color: '#c62828' }
];
const easiState    = {};  // { [reportId]: { head:{E,I,Ex,L,A}, trunk:..., upperLimb:..., lowerLimb:..., iga:0 } }
const chartInstances = {}; // { [reportId]: Chart }

let currentTab = 'pending';
let dashboardData = { pending: [], reviewed: [] };

function loadData() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('loading-state').innerHTML = '<div class="spinner" style="margin:0 auto 12px;"></div><div style="color:var(--text2);font-size:14px;">読み込み中...</div>';
  document.getElementById('tab-content-pending').style.display = 'none';
  document.getElementById('tab-content-reviewed').style.display = 'none';

  google.script.run
    .withSuccessHandler(data => {
      if (!data) {
        document.getElementById('loading-state').innerHTML = '<p style="color:var(--red);font-size:14px;">エラー: データがnullで返されました</p>';
        return;
      }
      dashboardData = data;
      renderAll();
    })
    .withFailureHandler(err => {
      document.getElementById('loading-state').innerHTML =
        '<p style="color:var(--red);font-size:14px;">読み込みエラー: ' + esc(String(err.message || err)) + '</p>';
    })
    .getDashboardData();
}

function renderAll() {
  document.getElementById('loading-state').style.display = 'none';

  try {
    const pendingCount = dashboardData.pending.length;
    const countEl = document.getElementById('pending-count');
    countEl.textContent = pendingCount;
    countEl.style.display = pendingCount > 0 ? 'inline' : 'none';

    renderList('pending', dashboardData.pending);
    renderList('reviewed', dashboardData.reviewed);
    switchTab(currentTab);
  } catch(e) {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('loading-state').innerHTML =
      '<p style="color:var(--red);font-size:13px;white-space:pre-wrap;">JSエラー: ' + esc(e.message) + '\n' + esc(e.stack || '') + '</p>';
  }
}

function renderList(type, reports) {
  const container = document.getElementById('tab-content-' + type);
  if (!reports || reports.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="e-icon">' +
      (type === 'pending' ? '📭' : '✅') + '</div><div>' +
      (type === 'pending' ? '未確認のレポートはありません' : '確認済みのレポートはありません') +
      '</div></div>';
    return;
  }
  const cards = [];
  for (const r of reports) {
    try {
      cards.push(buildReportCard(r, type));
    } catch(e) {
      cards.push(`<div class="report-card" style="border-color:var(--red);"><p style="color:var(--red);font-size:12px;">カード生成エラー (${esc(r.reportId||'')}): ${esc(e.message)}</p></div>`);
    }
  }
  // 既存Chartインスタンスを破棄
  reports.forEach(r => {
    if (chartInstances[r.reportId]) {
      try { chartInstances[r.reportId].destroy(); } catch(e) {}
      delete chartInstances[r.reportId];
    }
  });

  container.innerHTML = cards.join('');

  if (type === 'pending') {
    reports.forEach(r => { try { initEasiState(r.reportId, r.lastAssessment || null); } catch(e) {} });
  }

  // グラフ非同期読み込み（全カード）
  reports.forEach(r => { try { loadPatientChart(r.reportId, r.patientNo); } catch(e) {} });
}

function buildReportCard(r, type) {
  const poemTotal = Object.values(r.poemScores || {}).reduce((s, v) => s + (v || 0), 0);
  const poemSeverity = poemTotal <= 2 ? '症状なし' : poemTotal <= 7 ? '軽症' : poemTotal <= 16 ? '中等症' : poemTotal <= 24 ? '重症' : '最重症';
  const poemColor = poemTotal <= 2 ? 'var(--green-bg);color:var(--green-text)' :
                    poemTotal <= 7 ? '#f1f8e9;color:#2e7d32' :
                    poemTotal <= 16 ? 'var(--amber-bg);color:var(--amber-text)' : 'var(--red-bg);color:var(--red-text)';

  const symptomColor = SYMPTOM_COLORS[r.symptomScore] || 'var(--text2)';
  const dateStr = r.submittedAt ? new Date(r.submittedAt).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

  // 悪化因子
  const triggersHtml = (r.triggers && r.triggers.length > 0)
    ? `<div class="section-title">悪化因子</div>
       <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
         ${r.triggers.map(k => `<span style="background:#fff3e0;color:#e65100;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;">${esc(TRIGGER_LABELS[k] || k)}</span>`).join('')}
       </div>
       ${r.triggerNote ? `<div style="font-size:13px;color:var(--text2);background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:12px;">${esc(r.triggerNote)}</div>` : ''}`
    : (r.triggerNote
      ? `<div class="section-title">悪化因子（その他）</div>
         <div style="font-size:13px;color:var(--text2);background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:12px;">${esc(r.triggerNote)}</div>`
      : '');

  const calcUrl = 'https://haman-360.github.io/atopic-calculator/atopic_calculator.html'
    + '?p=' + encodeURIComponent(r.patientNo)
    + '&ageGroup=' + encodeURIComponent(r.ageGroup || 'child3')
    + '&ageLabel=' + encodeURIComponent(r.ageLabel || '');

  // POEM グリッド
  const poemGrid = Object.entries(POEM_LABELS).map(([key, label]) => {
    const val = (r.poemScores || {})[key];
    return `<div class="poem-item"><div class="p-label">${esc(label)}</div><div class="p-val">${val !== null && val !== undefined ? val : '—'}</div></div>`;
  }).join('');

  // 薬の残量
  const remainHtml = (r.medicationRemain || []).map(m => {
    const levelLabel = m.remainLevel !== null && m.remainLevel !== undefined ? REMAIN_LABELS[m.remainLevel] : '—';
    const levelColor = m.remainLevel === 0 ? 'var(--red-text)' : m.remainLevel === 1 ? 'var(--amber-text)' : 'var(--green-text)';
    return `<div class="remain-item"><div class="r-name">${esc(m.drugName)}</div><div class="r-level" style="color:${levelColor};">${esc(levelLabel)}</div></div>`;
  }).join('');

  // 部位別外用頻度
  let topicalHtml = '';
  if (r.topicalUse && r.topicalUse.length > 0) {
    const byDrug = {};
    r.topicalUse.forEach(entry => {
      if (!byDrug[entry.drug]) byDrug[entry.drug] = [];
      byDrug[entry.drug].push(entry);
    });
    const rows = Object.entries(byDrug).map(([drug, entries]) => {
      const applied = entries
        .filter(e => e.freq !== '塗っていない')
        .map(e => `<span style="font-size:12px;">${esc(e.part)}→${esc(e.freq)}</span>`)
        .join('　');
      const notApplied = entries
        .filter(e => e.freq === '塗っていない')
        .map(e => esc(e.part))
        .join('・');
      return `<div style="margin-bottom:6px;">
        <span style="font-size:13px;font-weight:700;color:var(--teal);">${esc(drug)}</span>
        ${applied ? `<span style="margin-left:8px;color:var(--text);">${applied}</span>` : ''}
        ${notApplied ? `<span style="margin-left:8px;font-size:11px;color:var(--text3);">（${notApplied}：塗っていない）</span>` : ''}
      </div>`;
    }).join('');
    topicalHtml = `<div class="section-title">部位別外用頻度</div><div style="margin-bottom:12px;">${rows}</div>`;
  }

  // 前回処方
  let rxHtml = '';
  if (r.lastRx) {
    const drugs = r.lastRx.drugsJson || [];
    const schedLines = drugs.map(d => d.scheduleText || (d.name + (d.partLabel ? '（' + d.partLabel + '）' : '') + (d.freqLabel ? '　' + d.freqLabel : '')));
    const schedDisplay = schedLines.length ? schedLines.join('\n') : (r.lastRx.rxSummaryText || '');
    rxHtml = `
    <div class="section-title">前回処方</div>
    <div class="rx-summary">${esc(schedDisplay)}</div>
  `;
  }

  // 医師コメント欄 or 保存済みコメント
  const commentHtml = type === 'pending' ? `
    <div class="comment-area">
      <label>🖊 医師コメント（処方・次回受診など）</label>
      <textarea class="comment-input" id="comment-${esc(r.reportId)}" placeholder="例：ロコイドを減量して週3回に。次回2週間後。">${esc(r.doctorComment || '')}</textarea>
      <div class="next-appt-row">
        <label>次回受診日</label>
        <input type="date" id="appt-${esc(r.reportId)}" value="${esc(r.nextAppointment || '')}">
      </div>
      <button class="save-btn" onclick="saveComment('${esc(r.reportId)}')">保存して確認済みにする</button>
    </div>
  ` : `
    <div class="comment-area">
      <div class="section-title">医師コメント</div>

// ===== EASI/IGA ユーティリティ =====
function calcEasiLocal(state) {
  let total = 0;
  const parts = {};
  EASI_PARTS.forEach(part => {
    const p = state[part] || {};
    const signs = (p.E||0) + (p.I||0) + (p.Ex||0) + (p.L||0);
    const score = Math.round(signs * (p.A||0) * EASI_WEIGHT[part] * 10) / 10;
    parts[part] = score;
    total += score;
  });
  return { parts, total: Math.round(total * 10) / 10 };
}

function getEasiSeverityLocal(total) {
  for (const s of EASI_SEVERITY_MAP) { if (total <= s.max) return s; }
  return EASI_SEVERITY_MAP[EASI_SEVERITY_MAP.length - 1];
}

// EASI入力グリッド（pending用）を生成
function buildEasiSection(r, type) {
  if (type !== 'pending') {
    // 確認済み：読み取り専用表示
    if (!r.lastAssessment) return '';
    const a = r.lastAssessment;
    const sev = getEasiSeverityLocal(a.easiTotal);
    return `
      <div class="section-title">重症度評価（EASI/IGA）</div>
      <div class="easi-readonly">
        <span>EASI合計：<span class="easi-val">${a.easiTotal}</span></span>
        <span class="easi-severity" style="background:${sev.bg};color:${sev.color};">${esc(sev.label)}</span>
        ${a.iga !== null && a.iga !== undefined ? `<span>IGA：<span class="easi-val">${a.iga}</span></span>` : ''}
        ${a.notes ? `<span style="font-size:12px;color:var(--text2);">${esc(a.notes)}</span>` : ''}

  }

    `<th style="text-align:center;min-width:120px;">${esc(EASI_SIGN_LABELS[s])}<br><span style="font-weight:400;color:var(--text3);">${s} (0-3)</span></th>`
  ).join('') + `<th style="text-align:center;min-width:168px;">面積<br><span style="font-weight:400;color:var(--text3);">A (0-6)</span></th>`

      `<button class="easi-btn" id="easi-btn-${rid}-${part}-A-${v}" onclick="easiBtnClick('${rid}','${part}','A',${v})">${v}</button>`
    ).join('')}</div></td>`;
    return `<tr>
      <td class="easi-part-label">${esc(EASI_PART_LABELS[part])}</td>
      ${signBtns}${areaBtns}
      <td class="easi-part-score" id="easi-score-${rid}-${part}">0</td>
    </tr>`;
  }).join('');

  return `
    <div class="section-title">重症度評価（EASI/IGA）</div>
    <div style="overflow-x:auto;">
      <table class="easi-table">
        <thead><tr><th>部位</th>${signCols}</tr></thead>

      <span style="font-size:14px;font-weight:700;">EASI合計：<span id="easi-total-${rid}" style="color:var(--teal);">0</span></span>
      <span class="easi-severity" id="easi-severity-${rid}" style="background:#f5f5f5;color:#9e9e9e;">Clear</span>
    </div>
    <div style="margin-bottom:10px;">
      <div class="section-title" style="margin-top:0;">IGA（0〜4）</div>
      <div class="iga-btn-group">
        ${[0,1,2,3,4].map(v => `<button class="iga-btn" id="iga-btn-${rid}-${v}" onclick="igaBtnClick('${rid}',${v})">${v}</button>`).join('')}
      </div>
    </div>

      <div class="section-title" style="margin-top:0;">所見メモ（任意）</div>
      <textarea id="easi-notes-${rid}" class="comment-input" style="min-height:50px;" placeholder="所見を入力..."></textarea>

// ===== EASI状態初期化（DOM生成後に呼び出す） =====
function initEasiState(reportId, lastAssessment) {
  const raw = lastAssessment && lastAssessment.easiRawJson;
  const defaultPart = { E: 0, I: 0, Ex: 0, L: 0, A: 0 };
  easiState[reportId] = {
    head:      Object.assign({}, defaultPart, raw && raw.head      ? raw.head      : {}),
    trunk:     Object.assign({}, defaultPart, raw && raw.trunk     ? raw.trunk     : {}),
    upperLimb: Object.assign({}, defaultPart, raw && raw.upperLimb ? raw.upperLimb : {}),
    lowerLimb: Object.assign({}, defaultPart, raw && raw.lowerLimb ? raw.lowerLimb : {}),
    iga: lastAssessment && lastAssessment.iga !== null ? lastAssessment.iga : 0
  };
  updateEasiDisplay(reportId);
  // 既存メモを復元
  if (lastAssessment && lastAssessment.notes) {
    const notesEl = document.getElementById('easi-notes-' + reportId);
    if (notesEl) notesEl.value = lastAssessment.notes;
  }
}

// ===== EASIボタンクリック =====
function easiBtnClick(reportId, part, sign, value) {
  if (!easiState[reportId]) return;
  easiState[reportId][part][sign] = value;
  updateEasiDisplay(reportId);
}

function igaBtnClick(reportId, value) {
  if (!easiState[reportId]) return;
  easiState[reportId].iga = value;
  // IGAボタン選択状態を更新
  [0,1,2,3,4].forEach(v => {
    const btn = document.getElementById('iga-btn-' + reportId + '-' + v);
    if (btn) btn.classList.toggle('selected', v === value);
  });
}

// ===== EASI表示更新 =====
function updateEasiDisplay(reportId) {
  const state = easiState[reportId];
  if (!state) return;
  const { parts, total } = calcEasiLocal(state);

  EASI_PARTS.forEach(part => {
    // 部位スコア表示
    const scoreEl = document.getElementById('easi-score-' + reportId + '-' + part);
    if (scoreEl) scoreEl.textContent = parts[part];

    // ボタン選択状態
    const p = state[part];
    EASI_SIGNS.forEach(sign => {
      [0,1,2,3].forEach(v => {
        const btn = document.getElementById('easi-btn-' + reportId + '-' + part + '-' + sign + '-' + v);
        if (btn) btn.classList.toggle('selected', p[sign] === v);
      });
    });
    [0,1,2,3,4,5,6].forEach(v => {
      const btn = document.getElementById('easi-btn-' + reportId + '-' + part + '-A-' + v);
      if (btn) btn.classList.toggle('selected', p.A === v);
    });
  });

  // EASI合計・重症度
  const totalEl = document.getElementById('easi-total-' + reportId);
  if (totalEl) totalEl.textContent = total;
  const sevEl = document.getElementById('easi-severity-' + reportId);
  if (sevEl) {
    const sev = getEasiSeverityLocal(total);
    sevEl.textContent = sev.label;
    sevEl.style.background = sev.bg;
    sevEl.style.color = sev.color;
  }

  // IGAボタン選択状態
  [0,1,2,3,4].forEach(v => {
    const btn = document.getElementById('iga-btn-' + reportId + '-' + v);
    if (btn) btn.classList.toggle('selected', state.iga === v);
  });
}

// ===== EASI/IGA 保存 =====
function saveAssessment(reportId, patientNo) {
  const state = easiState[reportId];
  if (!state) { showToast('評価データが見つかりません'); return; }

  const visitDate = new Date().toISOString().slice(0, 10);
  const payload = {
    action: 'saveAssessment',
    patientNo: patientNo,
    visitDate: visitDate,
    easi: { head: state.head, trunk: state.trunk, upperLimb: state.upperLimb, lowerLimb: state.lowerLimb },
    iga: state.iga,
    reportId: reportId,
    notes: (document.getElementById('easi-notes-' + reportId) || {}).value || ''
  };

  const btn = document.getElementById('easi-save-' + reportId);
  if (btn) { btn.textContent = '保存中...'; btn.disabled = true; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.textContent = '評価を保存'; btn.disabled = false; }
      if (res.ok) {
        showToast('EASI/IGA評価を保存しました（合計 ' + res.easiTotal + '）');
        loadData();
      } else {
        showToast('保存失敗: ' + esc(res.reason || ''));
      }
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.textContent = '評価を保存'; btn.disabled = false; }
      showToast('エラー: ' + esc(err.message || '不明なエラー'));
    })
    .saveAssessment_(payload);
}

// ===== スコア推移グラフ =====

function loadPatientChart(reportId, patientNo) {
  // POEM/NRS: dashboardData からメモリ内で取得
  const allReports = (dashboardData.pending || []).concat(dashboardData.reviewed || []);
  const poemData = allReports
    .filter(function(r) { return r.patientNo === patientNo && r.submittedAt; })
    .map(function(r) {
      return {
        date: r.submittedAt.slice(0, 10),
        poemTotal: Object.values(r.poemScores || {}).reduce(function(s,v){ return s+(v||0); }, 0),
        nrsScore: (r.nrsScore !== null && r.nrsScore !== undefined) ? r.nrsScore : null
      };
    })
    .sort(function(a, b) { return a.date.localeCompare(b.date); });

  // EASI/IGA: google.script.run で非同期取得
  google.script.run
    .withSuccessHandler(function(res) {
      const assessments = (res && res.assessments ? res.assessments : [])
        .slice()
        .sort(function(a, b) { return (a.visitDate||'').localeCompare(b.visitDate||''); });
      renderChart(reportId, poemData, assessments);
    })
    .withFailureHandler(function() {
      renderChart(reportId, poemData, []);
    })
    .getAssessmentList_(patientNo);
}

function renderChart(reportId, poemData, assessments) {
  const placeholder = document.getElementById('chart-placeholder-' + reportId);
  const canvas      = document.getElementById('chart-' + reportId);
  if (!canvas) return;

  // データ不足時（合計2点未満）
  if (poemData.length + assessments.length <= 1) {
    if (placeholder) placeholder.textContent = 'データが蓄積されるとグラフが表示されます（2回目以降の受診から）';
    return;
  }

  // 日付ラベル: 両データの和集合・昇順
  const dateSet = new Set();
  poemData.forEach(function(d) { dateSet.add(d.date); });
  assessments.forEach(function(a) { if (a.visitDate) dateSet.add(a.visitDate); });
  const labels = Array.from(dateSet).sort();

  // 日付→値のマップ
  const poemMap = {}, nrsMap = {}, easiMap = {}, igaMap = {};
  poemData.forEach(function(d) { poemMap[d.date] = d.poemTotal; nrsMap[d.date] = d.nrsScore; });
  assessments.forEach(function(a) {
    if (a.visitDate) {
      easiMap[a.visitDate] = a.easiTotal;
      igaMap[a.visitDate]  = (a.iga !== null && a.iga !== undefined) ? a.iga : null;
    }
  });

  const poemVals = labels.map(function(d) { return d in poemMap ? poemMap[d] : null; });
  const nrsVals  = labels.map(function(d) { return d in nrsMap  ? nrsMap[d]  : null; });
  const easiVals = labels.map(function(d) { return d in easiMap ? easiMap[d] : null; });
  const igaVals  = labels.map(function(d) { return d in igaMap  ? igaMap[d]  : null; });

  // 既存インスタンス破棄
  if (chartInstances[reportId]) { try { chartInstances[reportId].destroy(); } catch(e) {} }

  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  chartInstances[reportId] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'POEM',
          data: poemVals,
          borderColor: '#4e79a7',
          backgroundColor: '#4e79a720',
          yAxisID: 'y',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          borderWidth: 2
        },
        {
          label: 'かゆみNRS',
          data: nrsVals,
          borderColor: '#f28e2b',
          backgroundColor: '#f28e2b20',
          yAxisID: 'y',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          borderWidth: 2
        },
        {
          label: 'EASI',
          data: easiVals,
          borderColor: '#e15759',
          backgroundColor: '#e1575920',
          yAxisID: 'y1',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          borderWidth: 2
        },
        {
          label: 'IGA',
          data: igaVals,
          borderColor: '#76b7b2',
          backgroundColor: '#76b7b220',
          borderDash: [5, 5],
          yAxisID: 'y',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } }
      },
      scales: {
        x: {
          ticks: { font: { size: 10 }, maxRotation: 30 },
          grid: { display: false }
        },
        y: {
          min: 0,
          max: 30,
          position: 'left',
          ticks: { font: { size: 10 }, stepSize: 5 },
          title: { display: true, text: 'POEM / NRS / IGA', font: { size: 10 } }
        },
        y1: {
          min: 0,
          max: 72,
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: { font: { size: 10 }, stepSize: 10 },
          title: { display: true, text: 'EASI', font: { size: 10 } }
        }
      }
    }
  });
}

function findReport(reportId) {
  for (const r of (dashboardData.pending  || [])) if (r.reportId === reportId) return r;
  for (const r of (dashboardData.reviewed || [])) if (r.reportId === reportId) return r;
  return null;
}

function buildClaudeSection(r, type) {
  const rid = esc(r.reportId);

  return `
    <div class="claude-section">

function generateClaudePrompt(reportId) {
  const r = findReport(reportId);
  if (!r) return;

  if (!r.lastAssessment) {
    const warnEl = document.getElementById('claude-warn-' + reportId);
    if (warnEl) warnEl.style.display = 'block';
    showToast('評価を先に保存してください');
    return;
  }

  const q = (document.getElementById('claude-q-' + reportId) || {}).value || '';
  const prompt = buildPromptText(r, q);

  const promptEl = document.getElementById('claude-prompt-' + reportId);
  const outputEl = document.getElementById('claude-output-' + reportId);
  if (promptEl) promptEl.value = prompt;
  if (outputEl) outputEl.style.display = 'block';
  if (promptEl) promptEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildPromptText(r, question) {
  const a = r.lastAssessment;
  const AGE_GROUP_LABELS = {
    infant: '0〜1歳未満', child1: '1〜3歳未満', child3: '3〜6歳未満',
    child10: '6〜12歳未満', adult: '12歳以上'
  };
  const POEM_SEVERITY_TEXT = function(t) {
    if (t <= 2)  return 'Clear';
    if (t <= 7)  return 'Mild';
    if (t <= 16) return 'Moderate';
    if (t <= 24) return 'Severe';
    return 'Very Severe';
  };

  const poemTotal = Object.values(r.poemScores || {}).reduce(function(s,v){ return s+(v||0); }, 0);
  const poemDetails = Object.entries(POEM_LABELS)
    .map(function(e){ return e[1] + ':' + ((r.poemScores||{})[e[0]] != null ? (r.poemScores||{})[e[0]] : '—'); })
    .join(' / ');

  const infectionText = (r.infectionSigns && r.infectionSigns.length)
    ? r.infectionSigns.map(function(k){ return INFECTION_LABELS[k] || k; }).join('、')
    : 'なし';

  const triggerParts = (r.triggers || []).map(function(k){ return TRIGGER_LABELS[k] || k; });
  if (r.triggerNote) triggerParts.push(r.triggerNote);
  const triggersText = triggerParts.length ? triggerParts.join('、') : '特になし';

  var drugsText = '情報なし';
  if (r.lastRx) {
    const drugs = r.lastRx.drugsJson || [];
    const lines = drugs.map(function(d){
      return d.scheduleText || (d.name + (d.partLabel ? '（' + d.partLabel + '）' : '') + (d.freqLabel ? '　' + d.freqLabel : ''));
    });
    drugsText = lines.length ? lines.join('\n') : (r.lastRx.rxSummaryText || '情報なし');
  }

  const medStatus = (r.medicationRemain || []).length
    ? r.medicationRemain.map(function(m){ return m.drugName + ': ' + (REMAIN_LABELS[m.remainLevel] || '—'); }).join('\n')
    : '情報なし';

  const lines = [
    '# アトピー性皮膚炎 治療方針相談',
    '',
    '## 患者基本情報',
    '年齢グループ: ' + (AGE_GROUP_LABELS[r.ageGroup] || r.ageGroup || '不明') + '（' + (r.ageLabel || '') + '）',
    '受診日: ' + (a.visitDate || new Date().toISOString().slice(0, 10)),

    '## 客観的評価（医師）',
    'EASI合計: ' + a.easiTotal + '点（' + a.easiSeverity + '）',
    '  頭頸部: ' + a.easiHead + ' / 体幹: ' + a.easiTrunk + ' / 上肢: ' + a.easiUpperLimb + ' / 下肢: ' + a.easiLowerLimb,
    'IGA: ' + (a.iga !== null && a.iga !== undefined ? a.iga : '—') + ' / 4',
    a.notes ? '所見メモ: ' + a.notes : null,
    '',
    '## 主観的評価（患者アンケート）',
    'POEM合計: ' + poemTotal + ' / 28（' + POEM_SEVERITY_TEXT(poemTotal) + '）',
    '  7項目詳細: ' + poemDetails,
    (r.nrsScore !== null && r.nrsScore !== undefined) ? 'かゆみNRS: ' + r.nrsScore + ' / 10' : 'かゆみNRS: 情報なし',
    '感染徴候: ' + infectionText,
    '悪化因子: ' + triggersText,
    '',
    '## 現在の処方（前回）',
    drugsText,
    '',
    '## 外用状況（患者申告）',
    medStatus,
    '',
    '## 医師からの相談内容',
    question || '（未記入）'
  ];
  return lines.filter(function(l){ return l !== null; }).join('\n');
}

function copyClaudePrompt(reportId) {
  const el = document.getElementById('claude-prompt-' + reportId);
  if (!el) return;
  const btn = document.getElementById('copy-btn-' + reportId);
  const reset = function() {
    if (btn) setTimeout(function(){ btn.textContent = '📋 クリップボードにコピー'; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(el.value).then(function() {
      if (btn) btn.textContent = '✓ コピーしました';
      reset();
    }).catch(function() {
      el.select(); document.execCommand('copy');
      if (btn) btn.textContent = '✓ コピーしました';
      reset();
    });
  } else {
    el.select(); document.execCommand('copy');
    if (btn) btn.textContent = '✓ コピーしました';
    reset();
  }
}

function saveComment(reportId) {
  const comment = document.getElementById('comment-' + reportId).value.trim();
  const nextAppt = document.getElementById('appt-' + reportId).value;

  const btn = document.querySelector(`#card-${reportId} .save-btn`);
  if (btn) { btn.textContent = '保存中...'; btn.disabled = true; }

  google.script.run
    .withSuccessHandler(res => {
      if (btn) { btn.textContent = '保存して確認済みにする'; btn.disabled = false; }
      if (res.ok) {
        showToast('保存しました');
        loadData();
      } else {
        showToast('保存失敗: ' + esc(res.reason || '') + (res.firstId ? '（ID不一致）' : ''));
      }
    })
    .withFailureHandler(err => {
      if (btn) { btn.textContent = '保存して確認済みにする'; btn.disabled = false; }
      showToast('エラー: ' + esc(err.message || '不明なエラー'));
    })
    .saveComment(reportId, comment, nextAppt);
}

function switchTab(tab) {
  currentTab = tab;
  ['pending', 'reviewed'].forEach(t => {
    document.getElementById('tab-btn-' + t) && null;
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-content-' + t).style.display = t === tab ? 'block' : 'none';
  });
}

// トースト
let _toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 起動
window.addEventListener('load', loadData);
</script>
