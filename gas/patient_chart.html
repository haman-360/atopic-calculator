<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテビュー</title>
<?!= include('shared_styles'); ?>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { max-width: none; }
.chart-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.chart-main { max-width: 820px; margin: 0 auto; padding: 16px 14px; }
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin: 12px 0 8px;
}
.section-title:first-child { margin-top: 0; }
.chart-container {
  position: relative;
  height: 260px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.chart-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  padding: 16px;
}
/* ===== 受診タイムライン ===== */
.visit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.visit-date-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.visit-date-label {
  font-size: 17px;
  font-weight: 700;
}
.visit-next-label {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  border-radius: 20px;
  padding: 2px 10px;
}
.score-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.score-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
.rx-summary {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  white-space: pre-wrap;
  line-height: 1.6;
  margin-bottom: 10px;
}
.poem-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 5px;
  margin-bottom: 8px;
}
.poem-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  text-align: center;
}
.poem-item .p-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
.poem-item .p-val { font-size: 14px; font-weight: 700; }
.remain-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.remain-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
}
.remain-item .r-name { font-weight: 600; font-size: 12px; }
.remain-item .r-level { font-size: 11px; color: var(--text2); }
.doctor-comment {
  background: var(--green-bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
.notes-comment {
  background: var(--blue-bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
.infection-alert {
  background: var(--red-bg);
  border: 1px solid var(--red-text);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--red-text);
  font-weight: 600;
}
.easi-readonly {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
/* 折りたたみ */
details summary {
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  padding: 5px 0;
  user-select: none;
  list-style: none;
  -webkit-tap-highlight-color: transparent;
}
details summary::-webkit-details-marker { display: none; }
details summary::before { content: '▶ '; font-size: 10px; }
details[open] summary::before { content: '▼ '; }
details .detail-body { padding: 8px 0 2px; }
/* 患者サマリー統計 */
.stat-box {
  text-align: center;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  min-width: 64px;
}
.stat-box .s-val { font-size: 22px; font-weight: 700; color: var(--teal); }
.stat-box .s-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
/* Claude相談エリア */
.consult-textarea {
  width: 100%;
  padding: 9px 11px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  min-height: 64px;
  resize: vertical;
  box-sizing: border-box;
}
.consult-textarea:focus { outline: none; border-color: var(--teal); }
.timeline-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="chart-header">
  <div>
    <h1 style="font-size:16px;font-weight:700;">📋 カルテビュー</h1>
    <div id="header-sub" style="font-size:11px;color:var(--text2);margin-top:2px;">はまこどもクリニック</div>
  </div>
  <button onclick="history.back()"
    style="padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;white-space:nowrap;">
    ← 戻る
  </button>
</div>

<!-- 読み込み中 -->
<div id="loading-state" class="phase">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px;">カルテを読み込み中...</div>
</div>

<!-- メインコンテンツ -->
<div id="main-content" style="display:none;" class="chart-main">

  <!-- 患者サマリー -->
  <div class="summary-card" id="patient-summary"></div>

  <!-- スコア推移グラフ -->
  <div class="summary-card">
    <div class="section-title">📊 スコア推移</div>
    <div class="chart-container">
      <div class="chart-placeholder" id="chart-placeholder">データが蓄積されるとグラフが表示されます（2回目以降の受診から）</div>
      <canvas id="main-chart" style="display:none;"></canvas>
    </div>
  </div>

  <!-- 受診タイムライン -->
  <div class="timeline-header" id="timeline-header"></div>
  <div id="timeline-container"></div>

  <!-- Claude治療相談 -->
  <div class="summary-card">
    <div class="section-title">🤖 Claude治療相談</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6;">全治療履歴を含むプロンプトをコピーして、<strong>Claude.ai</strong>に貼り付けて相談できます。</div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;">相談したいこと（任意）</label>
      <textarea id="consult-question" class="consult-textarea"
        placeholder="例：デュピクセントの適応を検討しています。現在の重症度から判断をお願いします。"></textarea>
    </div>
    <button id="copy-btn" onclick="copyConsultPrompt()"
      style="padding:10px 22px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">
      📋 クリップボードにコピー
    </button>
  </div>

</div>

<script>
const PATIENT_NO = '<?= patientNo ?>';

const POEM_LABELS = { itch: 'かゆみ', sleep: '睡眠障害', bleed: '皮膚出血', weep: '滲出', crack: 'ひび割れ', flake: '皮膚むけ', dry: '乾燥' };
const REMAIN_LABELS = ['なし', 'ほとんどない', '少し残ってる', 'たくさん'];
const SYMPTOM_LABELS = ['なし', '軽度', '中等度', '高度', '最重度'];
const SYMPTOM_COLORS = ['var(--green)', '#81c784', 'var(--amber)', '#e57373', 'var(--red)'];
const TRIGGER_LABELS = {
  sweat: '汗', dry: '乾燥・空気の乾き', pollen: '花粉・ほこり',
  pool: 'プール', clothes: '衣類・繊維', food: '食べ物',
  stress: 'ストレス・疲れ', other: 'その他'
};
const EASI_SEVERITY_MAP = [
  { max: 0,        label: 'Clear',       bg: '#f5f5f5',   color: '#9e9e9e' },
  { max: 6,        label: 'Mild',        bg: '#e8f5e9',   color: '#2e7d32' },
  { max: 21,       label: 'Moderate',    bg: '#fff8e1',   color: '#f57f17' },
  { max: 50,       label: 'Severe',      bg: '#fff3e0',   color: '#e65100' },
  { max: Infinity, label: 'Very Severe', bg: '#ffebee',   color: '#c62828' }
];

let chartData    = null;
let chartInstance = null;

// ===== ユーティリティ =====
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let _toastTimer;
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.style.opacity = '0'; }, 2500);
}

function poemChipStyle(total) {
  if (total <= 2)  return 'background:var(--green-bg);color:var(--green-text)';
  if (total <= 7)  return 'background:#f1f8e9;color:#2e7d32';
  if (total <= 16) return 'background:var(--amber-bg);color:var(--amber-text)';
  return 'background:var(--red-bg);color:var(--red-text)';
}

function poemSeverityLabel(total) {
  if (total <= 2)  return '症状なし';
  if (total <= 7)  return '軽症';
  if (total <= 16) return '中等症';
  if (total <= 24) return '重症';
  return '最重症';
}

function easiSeverityInfo(total) {
  for (var i = 0; i < EASI_SEVERITY_MAP.length; i++) {
    if (total <= EASI_SEVERITY_MAP[i].max) return EASI_SEVERITY_MAP[i];
  }
  return EASI_SEVERITY_MAP[EASI_SEVERITY_MAP.length - 1];
}

function fmtDate(d) {
  if (!d) return '';
  return String(d).replace(/^(\d{4})-(\d{2})-(\d{2})$/, function(_, y, m, dd) {
    return y + '年' + parseInt(m) + '月' + parseInt(dd) + '日';
  });
}

// ===== データ取得 =====
window.addEventListener('load', function() {
  if (!PATIENT_NO) {
    document.getElementById('loading-state').innerHTML =
      '<div class="phase-icon">⚠️</div>' +
      '<div class="phase-title" style="font-size:16px;">患者番号が指定されていません</div>';
    return;
  }
  google.script.run
    .withSuccessHandler(onDataLoaded)
    .withFailureHandler(function(err) {
      document.getElementById('loading-state').innerHTML =
        '<div class="phase-icon">⚠️</div>' +
        '<div class="phase-title" style="font-size:16px;">読み込みエラー</div>' +
        '<div class="phase-sub">' + esc(String(err.message || err)) + '</div>';
    })
    .getPatientChartData(PATIENT_NO);
});

function onDataLoaded(data) {
  document.getElementById('loading-state').style.display = 'none';
  if (!data || !data.ok) {
    document.getElementById('loading-state').style.display = 'flex';
    document.getElementById('loading-state').innerHTML =
      '<div class="phase-icon">⚠️</div>' +
      '<div class="phase-title" style="font-size:16px;">データ取得失敗</div>' +
      '<div class="phase-sub">' + esc((data && data.reason) || '不明なエラー') + '</div>';
    return;
  }
  chartData = data;
  document.getElementById('main-content').style.display = 'block';

  var ageStr = data.ageLabel ? (' · ' + data.ageLabel) : '';
  document.getElementById('header-sub').textContent =
    '診察券 ' + data.patientNo + ageStr + ' — はまこどもクリニック';

  renderPatientSummary(data);
  renderScoreChart(data);
  renderTimeline(data);
}

// ===== 患者サマリー =====
function renderPatientSummary(data) {
  var pi = data.patientInfo || {};
  var visitCount  = (data.visits      || []).length;
  var reportCount = (data.reports     || []).length;
  var assessCount = (data.assessments || []).length;
  var bdStr = pi.birthdate ? ' · 生年月日 ' + esc(pi.birthdate) : '';

  document.getElementById('patient-summary').innerHTML = [
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">',
      '<div>',
        '<div style="font-size:20px;font-weight:700;">診察券 ' + esc(data.patientNo) + '</div>',
        '<div style="font-size:14px;color:var(--text2);margin-top:4px;">' + esc(data.ageLabel || '') + bdStr + '</div>',
        (pi.notes ? '<div style="font-size:13px;color:var(--teal);margin-top:4px;">📝 ' + esc(pi.notes) + '</div>' : ''),
      '</div>',
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">',
        '<div class="stat-box"><div class="s-val">' + visitCount  + '</div><div class="s-lbl">受診</div></div>',
        '<div class="stat-box"><div class="s-val">' + reportCount + '</div><div class="s-lbl">レポート</div></div>',
        '<div class="stat-box"><div class="s-val">' + assessCount + '</div><div class="s-lbl">EASI評価</div></div>',
      '</div>',
    '</div>'
  ].join('');
}

// ===== スコア推移グラフ =====
function renderScoreChart(data) {
  var placeholder = document.getElementById('chart-placeholder');
  var canvas      = document.getElementById('main-chart');

  var poemMap = {}, nrsMap = {}, easiMap = {}, igaMap = {};
  (data.reports || []).forEach(function(r) {
    var d = r.submittedAt ? r.submittedAt.slice(0, 10) : null;
    if (!d) return;
    var pt = Object.values(r.poemScores || {}).reduce(function(s, v) { return s + (v || 0); }, 0);
    poemMap[d] = pt;
    if (r.nrsScore !== null && r.nrsScore !== undefined) nrsMap[d] = r.nrsScore;
  });
  (data.assessments || []).forEach(function(a) {
    var vd = a.visitDate ? String(a.visitDate).slice(0, 10) : null;
    if (!vd) return;
    easiMap[vd] = a.easiTotal;
    if (a.iga !== null && a.iga !== undefined) igaMap[vd] = a.iga;
  });

  var allDates = Object.keys(poemMap).concat(Object.keys(easiMap));
  var dateSet  = {};
  allDates.forEach(function(d) { dateSet[d] = true; });
  var labels   = Object.keys(dateSet).sort();

  if (labels.length <= 1) {
    if (placeholder) placeholder.textContent = 'データが蓄積されるとグラフが表示されます（2回目以降の受診から）';
    return;
  }

  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  if (chartInstance) { try { chartInstance.destroy(); } catch(e) {} }

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'POEM',     data: labels.map(function(d){ return d in poemMap ? poemMap[d] : null; }), borderColor: '#4e79a7', backgroundColor: '#4e79a720', yAxisID: 'y',  tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2 },
        { label: 'かゆみNRS', data: labels.map(function(d){ return d in nrsMap  ? nrsMap[d]  : null; }), borderColor: '#f28e2b', backgroundColor: '#f28e2b20', yAxisID: 'y',  tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2 },
        { label: 'EASI',     data: labels.map(function(d){ return d in easiMap ? easiMap[d] : null; }), borderColor: '#e15759', backgroundColor: '#e1575920', yAxisID: 'y1', tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2 },
        { label: 'IGA',      data: labels.map(function(d){ return d in igaMap  ? igaMap[d]  : null; }), borderColor: '#76b7b2', backgroundColor: '#76b7b220', borderDash: [5, 5], yAxisID: 'y', tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } } },
      scales: {
        x: {
          ticks: { font: { size: 10 }, maxRotation: 30,
            callback: function(value) {
              var lbl = this.getLabelForValue(value);
              if (!lbl) return lbl;
              var p = String(lbl).split('-');
              return p.length === 3 ? parseInt(p[1]) + '/' + parseInt(p[2]) : lbl;
            }
          },
          grid: { display: false }
        },
        y:  { min: 0, max: 30, position: 'left',  ticks: { font: { size: 10 }, stepSize: 5  }, title: { display: true, text: 'POEM / NRS / IGA', font: { size: 10 } } },
        y1: { min: 0, max: 72, position: 'right', ticks: { font: { size: 10 }, stepSize: 10 }, title: { display: true, text: 'EASI', font: { size: 10 } }, grid: { drawOnChartArea: false } }
      }
    }
  });
}

// ===== タイムライン =====
function renderTimeline(data) {
  var container = document.getElementById('timeline-container');
  var visits     = data.visits || [];

  document.getElementById('timeline-header').textContent =
    '受診タイムライン（' + visits.length + '件）';

  if (visits.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px;">処方履歴がありません</div>';
    return;
  }

  // visitDates（昇順）: reportを次の受診日に紐付けるために必要
  var visitDates = visits.map(function(v) { return v.visitDate; }).slice().sort();

  // report → 次の受診日にマッピング
  var reportsByVisitDate = {};
  (data.reports || []).forEach(function(r) {
    var rd = r.submittedAt ? r.submittedAt.slice(0, 10) : null;
    if (!rd) return;
    var targetDate = null;
    for (var i = 0; i < visitDates.length; i++) {
      if (visitDates[i] >= rd) { targetDate = visitDates[i]; break; }
    }
    if (!targetDate) return; // 対応する受診日なし
    if (!reportsByVisitDate[targetDate]) reportsByVisitDate[targetDate] = [];
    reportsByVisitDate[targetDate].push(r);
  });

  // assessment → visitDate にマッピング（最初の1件）
  var assessByVisitDate = {};
  (data.assessments || []).forEach(function(a) {
    var vd = a.visitDate ? String(a.visitDate).slice(0, 10) : null;
    if (vd && !assessByVisitDate[vd]) assessByVisitDate[vd] = a;
  });

  var html = visits.map(function(v) {
    return buildVisitCard(
      v,
      reportsByVisitDate[v.visitDate] || [],
      assessByVisitDate[v.visitDate]   || null
    );
  }).join('');

  container.innerHTML = html;
}

function buildVisitCard(visit, reports, assessment) {
  // 同一受診日に複数レポートがある場合は最初を使用
  var report = reports.length > 0 ? reports[0] : null;

  // --- 日付ヘッダー ---
  var dateHtml = [
    '<div class="visit-date-header">',
      '<span class="visit-date-label">' + esc(fmtDate(visit.visitDate)) + '</span>',
      (visit.nextVisitDate
        ? '<span class="visit-next-label">次回: ' + esc(fmtDate(visit.nextVisitDate)) + '</span>'
        : ''),
    '</div>'
  ].join('');

  // --- スコアチップ ---
  var chips = [];
  if (report) {
    var poemTotal = Object.values(report.poemScores || {}).reduce(function(s, v) { return s + (v || 0); }, 0);
    chips.push('<span class="score-chip" style="' + poemChipStyle(poemTotal) + '">POEM ' + poemTotal + '点（' + esc(poemSeverityLabel(poemTotal)) + '）</span>');
    if (report.nrsScore !== null && report.nrsScore !== undefined) {
      chips.push('<span class="score-chip" style="background:#e8f5f0;color:#085041;">NRS ' + esc(String(report.nrsScore)) + '/10</span>');
    }
    var sc = SYMPTOM_COLORS[report.symptomScore] || 'var(--text2)';
    chips.push('<span class="score-chip" style="background:' + esc(sc) + '20;color:' + esc(sc) + ';">症状: ' + esc(SYMPTOM_LABELS[report.symptomScore] || '—') + '</span>');
  }
  if (assessment) {
    var sev = easiSeverityInfo(assessment.easiTotal);
    chips.push('<span class="score-chip" style="background:' + esc(sev.bg) + ';color:' + esc(sev.color) + ';">EASI ' + assessment.easiTotal + '（' + esc(sev.label) + '）</span>');
    if (assessment.iga !== null && assessment.iga !== undefined) {
      chips.push('<span class="score-chip" style="background:#e3f2fd;color:#1565c0;">IGA ' + assessment.iga + '</span>');
    }
  }
  var chipsHtml = chips.length > 0
    ? '<div class="score-chips">' + chips.join('') + '</div>'
    : '';

  // --- 感染徴候アラート ---
  var infectionHtml = '';
  if (report && report.infectionSigns && report.infectionSigns.length > 0) {
    infectionHtml = '<div class="infection-alert">⚠️ 感染徴候: ' + esc(report.infectionSigns.join('、')) + '</div>';
  }

  // --- 処方内容 ---
  var rxHtml = '';
  if (visit.rxSummaryText || (visit.drugsJson && visit.drugsJson.length > 0)) {
    var drugs   = visit.drugsJson || [];
    var display = visit.rxSummaryText || drugs.map(function(d) {
      return d.name + (d.partLabel ? '（' + d.partLabel + '）' : '') + (d.freqLabel ? ' ' + d.freqLabel : '');
    }).join('\n');
    rxHtml = '<div class="section-title">💊 処方内容</div><div class="rx-summary">' + esc(display) + '</div>';
  }

  // --- POEM詳細 ---
  var poemHtml = '';
  if (report && report.poemScores && Object.keys(report.poemScores).length > 0) {
    var grid = Object.entries(POEM_LABELS).map(function(e) {
      var val = report.poemScores[e[0]];
      return '<div class="poem-item"><div class="p-label">' + esc(e[1]) + '</div>' +
             '<div class="p-val">' + (val !== undefined && val !== null ? val : '—') + '</div></div>';
    }).join('');
    poemHtml = '<div class="section-title">POEM詳細</div><div class="poem-grid">' + grid + '</div>';
  }

  // --- EASI/IGA詳細 ---
  var easiHtml = '';
  if (assessment) {
    var sev2 = easiSeverityInfo(assessment.easiTotal);
    easiHtml = '<div class="section-title">EASI/IGA評価</div>' +
      '<div class="easi-readonly">' +
        '<span>EASI合計: <strong>' + assessment.easiTotal + '</strong></span>' +
        '<span class="score-chip" style="background:' + esc(sev2.bg) + ';color:' + esc(sev2.color) + ';">' + esc(sev2.label) + '</span>' +
        (assessment.iga !== null && assessment.iga !== undefined
          ? '<span>IGA: <strong>' + assessment.iga + '</strong></span>'
          : '') +
      '</div>';
  }

  // --- 医師コメント / 所見メモ ---
  var commentHtml = '';
  if (report && report.doctorComment) {
    commentHtml += '<div class="section-title">🖊 医師コメント</div>' +
      '<div class="doctor-comment">' + esc(report.doctorComment) + '</div>';
  }
  if (assessment && assessment.notes) {
    commentHtml += '<div class="section-title">🔬 所見メモ</div>' +
      '<div class="notes-comment">' + esc(assessment.notes) + '</div>';
  }

  // --- 折りたたみ（残薬・悪化因子・部位別外用） ---
  var collapsibleInner = '';

  var hasRemain   = report && report.medicationRemain && report.medicationRemain.length > 0;
  var hasTriggers = report && ((report.triggers && report.triggers.length > 0) || report.triggerNote);
  var hasTopical  = report && report.topicalUse && report.topicalUse.length > 0;

  if (hasRemain) {
    var remainItems = report.medicationRemain.map(function(m) {
      var ll = REMAIN_LABELS[m.remainLevel] || '—';
      var lc = m.remainLevel === 0 ? 'var(--red-text)' : m.remainLevel === 1 ? 'var(--amber-text)' : 'var(--green-text)';
      return '<div class="remain-item">' +
        '<div class="r-name">' + esc(m.drugName) + '</div>' +
        '<div class="r-level" style="color:' + lc + ';">' + esc(ll) + '</div></div>';
    }).join('');
    collapsibleInner += '<div class="section-title" style="margin-top:6px;">薬の残量</div>' +
      '<div class="remain-grid">' + remainItems + '</div>';
  }

  if (hasTriggers) {
    var trigTags = (report.triggers || []).map(function(k) {
      return '<span style="background:#fff3e0;color:#e65100;border-radius:20px;padding:3px 8px;font-size:12px;font-weight:600;display:inline-block;margin:2px 3px 2px 0;">' + esc(TRIGGER_LABELS[k] || k) + '</span>';
    }).join('');
    collapsibleInner += '<div class="section-title" style="margin-top:6px;">悪化因子</div>' +
      '<div style="flex-wrap:wrap;">' + trigTags + '</div>';
    if (report.triggerNote) {
      collapsibleInner += '<div style="font-size:12px;color:var(--text2);margin-top:4px;">' + esc(report.triggerNote) + '</div>';
    }
  }

  if (hasTopical) {
    var byDrug = {};
    report.topicalUse.forEach(function(entry) {
      if (!byDrug[entry.drug]) byDrug[entry.drug] = [];
      byDrug[entry.drug].push(entry);
    });
    var topRows = Object.entries(byDrug).map(function(kv) {
      var drug    = kv[0];
      var entries = kv[1];
      var applied = entries
        .filter(function(e) { return e.freq !== '塗っていない'; })
        .map(function(e) { return '<span style="font-size:12px;">' + esc(e.part) + '→' + esc(e.freq) + '</span>'; })
        .join('　');
      var notApplied = entries
        .filter(function(e) { return e.freq === '塗っていない'; })
        .map(function(e) { return esc(e.part); })
        .join('・');
      return '<div style="margin-bottom:5px;font-size:13px;">' +
        '<span style="font-weight:700;color:var(--teal);">' + esc(drug) + '</span>' +
        (applied    ? ' <span style="color:var(--text);">' + applied + '</span>' : '') +
        (notApplied ? ' <span style="font-size:11px;color:var(--text3);">（' + notApplied + '：塗っていない）</span>' : '') +
        '</div>';
    }).join('');
    collapsibleInner += '<div class="section-title" style="margin-top:6px;">部位別外用頻度</div>' + topRows;
  }

  var collapsibleHtml = (collapsibleInner)
    ? '<details style="margin-top:6px;"><summary>残薬・悪化因子・外用状況を見る</summary><div class="detail-body">' + collapsibleInner + '</div></details>'
    : '';

  return '<div class="visit-card">' +
    dateHtml +
    chipsHtml +
    infectionHtml +
    rxHtml +
    poemHtml +
    easiHtml +
    commentHtml +
    collapsibleHtml +
    '</div>';
}

// ===== Claude治療相談 =====
function copyConsultPrompt() {
  if (!chartData) { showToast('データが読み込まれていません'); return; }
  var question = (document.getElementById('consult-question') || {}).value || '';
  var prompt   = buildPrompt(chartData, question);
  var btn      = document.getElementById('copy-btn');
  function done() {
    if (btn) {
      btn.textContent = '✓ コピーしました';
      setTimeout(function() { btn.textContent = '📋 クリップボードにコピー'; }, 2500);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(prompt).then(done).catch(function() { fallbackCopy(prompt); done(); });
  } else { fallbackCopy(prompt); done(); }
}

function fallbackCopy(text) {
  var el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

function buildPrompt(data, question) {
  var SYMPTOM_LBL = ['症状なし', '軽度', '中等度', '高度', '最重度'];
  var POEM_LBL    = { itch: 'かゆみ', sleep: '睡眠', bleed: '出血', weep: '浸出液', crack: 'ひび割れ', flake: '皮膚のむけ', dry: '乾燥' };
  var REMAIN_LBL  = { 0: '残なし', 1: 'ほとんどない', 2: '少し残ってる', 3: 'たくさん残ってる' };
  var EASI_SEV    = { clear: 'Clear', mild: 'Mild', moderate: 'Moderate', severe: 'Severe', very_severe: 'Very Severe' };
  function poemSev(t) { return t === 0 ? 'Clear' : t <= 2 ? 'Almost Clear' : t <= 7 ? 'Mild' : t <= 16 ? 'Moderate' : t <= 24 ? 'Severe' : 'Very Severe'; }

  var pi   = data.patientInfo || {};
  var lines = [];
  lines.push('# アトピー性皮膚炎 治療相談');
  lines.push('');
  lines.push('## 患者基本情報');
  lines.push('- 診察券番号: ' + data.patientNo);
  lines.push('- 生年月日: '   + (pi.birthdate || '不明'));
  lines.push('- 年齢: '       + (data.ageLabel || '不明'));
  if (pi.notes) lines.push('- 特記事項: ' + pi.notes);
  lines.push('');

  lines.push('## レポート履歴（' + data.reports.length + '件）');
  data.reports.forEach(function(r, i) {
    var pt = Object.values(r.poemScores || {}).reduce(function(s, v) { return s + (Number(v) || 0); }, 0);
    lines.push('');
    lines.push('### レポート' + (i + 1) + '（' + (r.submittedAt ? r.submittedAt.slice(0, 10) : '不明') + '）');
    lines.push('- 全体症状: ' + (SYMPTOM_LBL[r.symptomScore] || r.symptomScore));
    lines.push('- かゆみNRS: ' + (r.nrsScore != null ? r.nrsScore + '/10' : '未回答'));
    lines.push('- POEM合計: ' + pt + '/28（' + poemSev(pt) + '）');
    var poemDetail = Object.entries(POEM_LBL).map(function(e) {
      return e[1] + ':' + ((r.poemScores && r.poemScores[e[0]] != null) ? r.poemScores[e[0]] : '—');
    });
    lines.push('  ' + poemDetail.join(' / '));
    if (r.infectionSigns && r.infectionSigns.length) lines.push('- 感染徴候: ' + r.infectionSigns.join('、'));
    if (r.triggers && r.triggers.length) lines.push('- 悪化因子: ' + r.triggers.map(function(k) { return TRIGGER_LABELS[k] || k; }).join('、'));
    if (r.triggerNote) lines.push('  （' + r.triggerNote + '）');
    if (r.medicationRemain && r.medicationRemain.length) {
      lines.push('- 薬残量: ' + r.medicationRemain.map(function(m) { return m.drugName + ':' + (REMAIN_LBL[m.remainLevel] || '—'); }).join(' / '));
    }
    if (r.symptomNotes)  lines.push('- 自由記述: ' + r.symptomNotes);
    if (r.doctorComment) lines.push('- 医師コメント: ' + r.doctorComment);
  });
  lines.push('');

  lines.push('## 全訪問・処方履歴（' + data.visits.length + '件）');
  data.visits.forEach(function(v) {
    lines.push('- ' + v.visitDate + (v.nextVisitDate ? '（次回: ' + v.nextVisitDate + '）' : ''));
    if (v.rxSummaryText) {
      v.rxSummaryText.split('\n').forEach(function(l) { if (l.trim()) lines.push('  ' + l); });
    } else if (v.drugsJson && v.drugsJson.length) {
      v.drugsJson.forEach(function(d) {
        lines.push('  ' + d.name + (d.partLabel ? '（' + d.partLabel + '）' : '') + (d.freqLabel ? ' ' + d.freqLabel : ''));
      });
    }
  });
  lines.push('');

  lines.push('## EASI/IGA評価履歴（' + data.assessments.length + '件）');
  if (data.assessments.length === 0) {
    lines.push('（評価記録なし）');
  } else {
    data.assessments.forEach(function(a) {
      var date = a.visitDate || (a.assessedAt ? a.assessedAt.slice(0, 10) : '不明');
      var sev  = EASI_SEV[a.easiSeverity] || a.easiSeverity || '';
      lines.push('- ' + date + '  EASI: ' + a.easiTotal + '（' + sev + '）  IGA: ' + (a.iga != null ? a.iga : '—'));
      if (a.notes) lines.push('  所見: ' + a.notes);
    });
  }
  lines.push('');

  lines.push('## 医師からの相談内容');
  lines.push(question || '長期的な治療経過を踏まえ、現在の治療戦略について助言してください。');

  return lines.join('\n');
}
